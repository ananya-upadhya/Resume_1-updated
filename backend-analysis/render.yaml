# render.yaml
# Render free-tier deployment for Resume Intelligence API
# Free plan: 512MB RAM, shared CPU, spun down after 15min inactivity

services:
  - type: web
    name: resume-intelligence-api
    runtime: python
    plan: free
    region: oregon

    buildCommand: |
      pip install -r requirements.txt
      python -m spacy download en_core_web_sm

    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000

    healthCheckPath: /health

    envVars:
      - key: USE_LLM
        value: "true"
      - key: LLM_PROVIDER
        value: "groq"
      - key: LLM_MODEL
        value: "llama-3.3-70b-versatile"
      - key: GROQ_API_KEY
        sync: false   # Set this manually in the Render dashboard — never commit your key
        # Get your free key at: https://console.groq.com
